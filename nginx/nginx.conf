events {
    worker_connections 1024;
}

http {
    server {
        server_name ilifapropertygroup.com www.ilifapropertygroup.com;

        client_max_body_size 10M;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/ {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # CRITICAL: Forward the original request origin for CORS validation
            proxy_set_header Origin $scheme://$server_name;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /uploads/ {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        listen 443 ssl; # managed by Certbot
        ssl_certificate /etc/letsencrypt/live/ilifapropertygroup.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/ilifapropertygroup.com/privkey.pem; # managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    }

    server {
        if ($host = www.ilifapropertygroup.com) {
            return 301 https://$host$request_uri;
        } # managed by Certbot

        if ($host = ilifapropertygroup.com) {
            return 301 https://$host$request_uri;
        } # managed by Certbot

        listen 80;
        server_name ilifapropertygroup.com www.ilifapropertygroup.com;
        return 404; # managed by Certbot
    }
}
