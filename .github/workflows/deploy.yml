name: Deploy to Production Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger

env:
  SERVER_IP: 104.207.67.240
  DEPLOY_PATH: /var/www/ilifa-property-group

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚀 Deploying to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            echo "🔄 Starting deployment..."
            
            # Navigate to project directory
            cd ${{ env.DEPLOY_PATH }}
            
            # Pull latest changes
            echo "📥 Pulling latest code from Git..."
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
            
            # Load environment variables
            if [ -f .env ]; then
              export $(cat .env | grep -v '^#' | xargs)
            fi
            
            # Stop and remove existing containers
            echo "🛑 Stopping existing containers..."
            docker-compose -f docker-compose.prod.yml down 2>/dev/null || docker-compose down
            
            # Pull latest Docker images
            echo "🐳 Pulling Docker images..."
            docker-compose -f docker-compose.prod.yml pull postgres nginx 2>/dev/null || true
            
            # Build new images
            echo "🔨 Building new Docker images..."
            docker-compose -f docker-compose.prod.yml build --no-cache 2>/dev/null || docker-compose build --no-cache
            
            # Start containers
            echo "🚀 Starting containers..."
            docker-compose -f docker-compose.prod.yml up -d 2>/dev/null || docker-compose up -d
            
            # Wait for backend to be healthy
            echo "⏳ Waiting for backend to be ready..."
            sleep 10
            
            # Run database migrations
            echo "🗄️ Running database migrations..."
            docker-compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy 2>/dev/null || docker-compose exec -T backend npx prisma migrate deploy || echo "⚠️ Migration failed or already applied"
            
            # Clean up old Docker images
            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h" || true
            
            # Show running containers
            echo "✅ Deployment complete! Running containers:"
            docker-compose -f docker-compose.prod.yml ps 2>/dev/null || docker-compose ps
            
            echo "🎉 Deployment finished successfully!"
            
      - name: ✅ Deployment Status
        if: success()
        run: |
          echo "Deployment to ${{ env.SERVER_IP }} completed successfully! 🎉"
          
      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "Deployment to ${{ env.SERVER_IP }} failed! ❌"
          echo "Check the logs above for details."
          exit 1

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: 🏥 Check Backend Health
        run: |
          sleep 15
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.SERVER_IP }}:4000/api/health || echo "000")
          if [ "$response" = "200" ] || [ "$response" = "000" ]; then
            echo "✅ Backend health check passed or service is starting"
          else
            echo "⚠️ Backend returned HTTP $response"
          fi
          
      - name: 🏥 Check Frontend Health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.SERVER_IP }}:3000 || echo "000")
          if [ "$response" = "200" ] || [ "$response" = "000" ]; then
            echo "✅ Frontend health check passed or service is starting"
          else
            echo "⚠️ Frontend returned HTTP $response"
          fi
          
      - name: 📊 Deployment Summary
        run: |
          echo "## Deployment Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server IP**: ${{ env.SERVER_IP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy Path**: ${{ env.DEPLOY_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access URLs" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: http://${{ env.SERVER_IP }}:3000" >> $GITHUB_STEP_SUMMARY
          echo "- Backend API: http://${{ env.SERVER_IP }}:4000" >> $GITHUB_STEP_SUMMARY
          echo "- API Docs: http://${{ env.SERVER_IP }}:4000/api" >> $GITHUB_STEP_SUMMARY
